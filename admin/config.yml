# Vellikkeel Waves — CMS configuration
# ─────────────────────────────────────────────────────────────
# TODO before first login (see deployment guide):
#   1. Replace YOUR_GITHUB_USERNAME/YOUR_REPO below with your repo.
#   2. Replace base_url with your deployed sveltia-cms-auth Worker URL.
# ─────────────────────────────────────────────────────────────
backend:
  name: github
  repo: Rude07/vellikkeel-waves
  branch: main
  base_url: https://sveltia-cms-auth.rudeep-ramesh0007.workers.dev

site_url: https://www.vellikkeelwaves.in
display_url: https://www.vellikkeelwaves.in
logo_url: /uploads/VELLIKKEEL_WAVES_LOGO_1.png

media_folder: static/uploads
public_folder: /uploads

collections:
  - name: settings
    label: "⚙️ Site Settings"
    files:
      - name: site
        label: "Global Settings (contact, SEO, social)"
        file: src/_data/site.json
        fields:
          - { name: name, label: "Business name", widget: string }
          - { name: legalName, label: "Legal name", widget: string }
          - name: tagline
            label: Tagline
            widget: object
            fields:
              - { name: en, label: English, widget: string }
              - { name: ml, label: Malayalam, widget: string }
          - { name: url, label: "Site URL", widget: string }
          - { name: logo, label: Logo, widget: image }
          - { name: ogImage, label: "Social share image (1200×630 recommended)", widget: image }
          - { name: whatsappNumber, label: "WhatsApp number (with country code)", widget: string }
          - { name: whatsappGreeting, label: "WhatsApp pre-filled greeting", widget: string }
          - { name: phone1, label: "Phone 1", widget: string }
          - { name: phone2, label: "Phone 2", widget: string }
          - { name: email, label: Email, widget: string, required: false }
          - { name: address, label: Address, widget: string }
          - { name: mapsUrl, label: "Google Maps link", widget: string }
          - { name: geoLat, label: "Latitude (from Google Maps)", widget: string }
          - { name: geoLng, label: "Longitude (from Google Maps)", widget: string }
          - { name: instagram, label: "Instagram URL", widget: string }
          - { name: facebook, label: "Facebook URL", widget: string }
          - { name: defaultLang, label: "Default language", widget: select, options: [en, ml] }
          - { name: floatingWhatsApp, label: "Show floating WhatsApp button", widget: boolean }
          - name: seo
            label: "SEO"
            widget: object
            fields:
              - { name: homeTitle, label: "Homepage title tag", widget: string }
              - { name: homeDescription, label: "Homepage meta description", widget: text }
              - { name: aboutTitle, label: "About page title tag", widget: string }
              - { name: aboutDescription, label: "About page meta description", widget: text }
              - { name: keywords, label: "Keywords", widget: string }

  - name: homepage
    label: "🏠 Homepage"
    files:
      - name: home
        label: "Homepage content"
        file: src/_data/home.json
        fields:
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - &bi_kicker { name: kicker, label: Kicker, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - &bi_heading { name: heading, label: Heading, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - &bi_sub { name: sub, label: Subtext, widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }
              - { name: image, label: "Hero photo", widget: image }
              - { name: imageAlt, label: "Photo description (for Google & accessibility)", widget: string }
          - name: cruisesIntro
            label: "Cruises — section intro"
            widget: object
            fields: [*bi_kicker, *bi_heading, *bi_sub]
          - name: cruises
            label: "Cruise cards"
            widget: list
            fields:
              - { name: title, label: Title, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - { name: desc, label: Description, widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }
              - { name: image, label: Photo, widget: image }
              - { name: imageAlt, label: "Photo description", widget: string }
              - { name: accent, label: "Colour accent", widget: select, options: [blue, amber, green, red] }
              - name: tags
                label: Tags
                widget: list
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ml, label: Malayalam, widget: string }
          - name: about
            label: "About Vellikkeel section"
            widget: object
            fields:
              - *bi_kicker
              - *bi_heading
              - { name: body, label: Body, widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }
              - { name: image, label: Photo, widget: image }
              - { name: imageAlt, label: "Photo description", widget: string }
              - name: points
                label: "Highlight points"
                widget: list
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ml, label: Malayalam, widget: string }
                  - { name: color, label: "Dot colour", widget: select, options: [blue, green, red] }
          - name: gallery
            label: "Gallery"
            widget: object
            fields:
              - *bi_kicker
              - *bi_heading
              - name: items
                label: Photos
                widget: list
                fields:
                  - { name: image, label: Photo, widget: image }
                  - { name: alt, label: "Photo description (for Google & accessibility)", widget: string }
                  - { name: size, label: "Tile size", widget: select, options: [normal, wide, big], default: normal }
          - name: reviews
            label: "Reviews"
            widget: object
            fields:
              - *bi_kicker
              - *bi_heading
              - { name: rating, label: "Rating number (e.g. 4.9)", widget: string }
              - { name: ratingNote, label: "Rating note", widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - name: items
                label: "Review cards"
                widget: list
                fields:
                  - { name: quote, label: Quote, widget: text }
                  - { name: name, label: "Guest name", widget: string }
                  - { name: meta, label: "Place · cruise type", widget: string }
                  - { name: color, label: "Avatar colour", widget: select, options: [blue, green, red, amber] }
          - name: food
            label: "Food"
            widget: object
            fields:
              - *bi_kicker
              - *bi_heading
              - *bi_sub
              - name: items
                label: Dishes
                widget: list
                fields:
                  - { name: name, label: Name, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
                  - { name: desc, label: Description, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
                  - { name: image, label: Photo, widget: image }
          - name: safety
            label: "Safety card"
            widget: object
            fields:
              - *bi_heading
              - name: items
                label: Points
                widget: list
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ml, label: Malayalam, widget: string }
          - name: bring
            label: "What to bring card"
            widget: object
            fields:
              - *bi_heading
              - name: items
                label: Points
                widget: list
                fields:
                  - { name: en, label: English, widget: string }
                  - { name: ml, label: Malayalam, widget: string }
          - name: plan
            label: "Visit & book section"
            widget: object
            fields:
              - *bi_kicker
              - *bi_heading
              - name: transport
                label: "How to reach"
                widget: list
                fields:
                  - { name: mode, label: Mode, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
                  - { name: detail, label: Detail, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - { name: note, label: "Form note", widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }

  - name: aboutpage
    label: "👥 About Us Page"
    files:
      - name: about
        label: "About Us & Team"
        file: src/_data/about.json
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: kicker, label: Kicker, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - { name: heading, label: Heading, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - { name: sub, label: Subtext, widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }
              - { name: image, label: Photo, widget: image }
              - { name: imageAlt, label: "Photo description", widget: string }
          - name: story
            label: "Our story"
            widget: object
            fields:
              - { name: heading, label: Heading, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - name: paragraphs
                label: Paragraphs
                widget: list
                fields:
                  - { name: en, label: English, widget: text }
                  - { name: ml, label: Malayalam, widget: text }
              - { name: image, label: Photo, widget: image }
              - { name: imageAlt, label: "Photo description", widget: string }
          - name: team
            label: "Team"
            widget: object
            fields:
              - { name: kicker, label: Kicker, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - { name: heading, label: Heading, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - name: members
                label: "Team members"
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: role, label: Role, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
                  - { name: bio, label: "Short bio", widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }
                  - { name: photo, label: Photo, widget: image }
          - name: values
            label: "Values"
            widget: object
            fields:
              - { name: heading, label: Heading, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
              - name: items
                label: "Value cards"
                widget: list
                fields:
                  - { name: title, label: Title, widget: object, fields: [{ name: en, label: English, widget: string }, { name: ml, label: Malayalam, widget: string }] }
                  - { name: desc, label: Description, widget: object, fields: [{ name: en, label: English, widget: text }, { name: ml, label: Malayalam, widget: text }] }
                  - { name: color, label: "Top border colour", widget: select, options: [blue, green, red] }
